<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Envelope</title>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap");
			@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap");
			@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali+Condensed:wght@400;700&display=swap");

			html,
			body {
				width: 100%;
				height: 100%;
				margin: 0;
			}

			body {
				display: grid;
				place-items: center;
				background: #f9f7f2;
				font-family: "Segoe UI", Tahoma, sans-serif;
			}

			.scene {
				position: relative;
				width: min(88vw, 620px);
				height: min(92vh, 760px);
			}

			.caption {
				position: absolute;
				left: 50%;
				transform: translateX(-50%);
				z-index: 8;
				margin: 0;
				color: #000000;
				font-weight: 700;
				letter-spacing: 0.04em;
				text-align: center;
				display: inline-block;
				white-space: nowrap;
			}

			.caption-top {
				top: 0;
				font-family: "Great Vibes", cursive;
				font-size: clamp(2.4rem, 5vw, 4rem);
				font-weight: 400;
				transform: translateX(-50%) rotate(-4deg);
				transition: transform 650ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			.caption-bottom {
				bottom: 0;
				font-family: "Noto Serif Bengali Condensed", "Noto Serif Bengali", serif;
				font-size: clamp(1.9rem, 4vw, 2.4rem);
				font-weight: 700;
				white-space: pre;
				transform: translateX(-50%);
				transition: transform 650ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			.caption-middle {
				top: 24%;
				font-family: "Noto Serif Bengali", serif;
				font-size: clamp(1.1rem, 2.4vw, 1.9rem);
				font-weight: 700;
				opacity: 0;
				transform: translateX(-50%);
				transition: opacity 420ms ease, transform 650ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			.caption-invite {
				top: 43%;
				font-family: "Great Vibes", cursive;
				font-size: clamp(2rem, 4.5vw, 3.3rem);
				font-weight: 400;
				line-height: 1.1;
				transform: translateX(-50%) rotate(-4deg);
				opacity: 0;
				transition: opacity 420ms ease, transform 650ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			.envelope-image {
				display: block;
				width: min(80vw, 520px);
				height: auto;
				max-height: 80vh;
				object-fit: contain;
			}

			.envelope-stack {
				position: absolute;
				left: 50%;
				top: 50%;
				width: min(88vw, 620px);
				max-height: 80vh;
				perspective: 1200px;
				cursor: pointer;
				transform: translate(-50%, -50%);
			}

			.envelope-stack img {
				display: block;
				width: 100%;
				height: auto;
			}

			.envelope-triangle {
				position: absolute;
				left: 0;
				top: 0;
				width: 100%;
				height: 100%;
				clip-path: polygon(0 0, 100% 0, 50% 70%);
				background: linear-gradient(180deg, #DEDCD7 0%, #DEDCD7  100%);
				pointer-events: none;
				z-index: 7;
				transform-origin: top center;
				transform-style: preserve-3d;
				backface-visibility: visible;
				transition: transform 650ms cubic-bezier(0.2, 0.8, 0.2, 1);
			}

			.envelope-stack.open .envelope-triangle {
				z-index: 4;
				transform: rotateX(-180deg);
			}

			.envelope-foreground {
				position: absolute;
				inset: 0;
				pointer-events: none;
				z-index: 6;
			}

			.envelope-stack .envelope-photo {
				position: absolute;
				left: 50%;
				top: 53%;
				width: 60%;
				height: auto;
				transform: translate(-50%, -50%);
				transition: transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
				object-fit: contain;
				pointer-events: none;
				z-index: 2;
			}

			.envelope-stack.open .envelope-photo {
				transform: translate(-50%, -112%);
				transition-duration: 650ms;
				z-index: 5;
			}

			.scene:has(.envelope-stack.open) .caption-top {
				transform: translateX(-50%) translateY(-14rem) rotate(-4deg);
			}

			.scene:has(.envelope-stack.open) .caption-middle {
				opacity: 1;
				transform: translateX(-50%) translateY(-20rem);
			}

			.scene:has(.envelope-stack.open) .caption-invite {
				opacity: 1;
				transform: translateX(-50%) rotate(-4deg);
				top: 82%;
			}

			.scene:has(.envelope-stack.open) .caption-bottom {
				transform: translateX(-50%) translateY(7rem);
			}

			.envelope-stack:focus-visible {
				outline: 3px solid #b9a57e;
				outline-offset: 10px;
			}
		</style>
	</head>
	<body>
			<div class="scene">
				<p class="caption caption-top" id="topText">Zeit zum Feiern!</p>
				<p class="caption caption-middle" id="middleText">WIR WERDEN HEIRATEN!</p>
				<div class="envelope-stack" id="envelope" role="button" tabindex="0" aria-pressed="false" aria-label="Envelope illustration">
					<img src="images/enevlope_background.png" alt="Envelope background" />
					<img class="envelope-photo" src="images/Nico-Vanessa-Foto.svg" alt="Nico and Vanessa" />
					<div class="envelope-triangle" aria-hidden="true"></div>
					<img class="envelope-foreground" src="images/envelope_foreground.png" alt="" aria-hidden="true" />
				</div>
				<p class="caption caption-invite" id="inviteText">Eine offizielle<br />Einladung folgt</p>
				<p class="caption caption-bottom" id="bottomText">DRÜCKE AUF DEN UMSCHLAG...</p>
			</div>

				<script>
					const envelope = document.getElementById("envelope");
					const topText = document.getElementById("topText");
					const middleText = document.getElementById("middleText");
					const bottomText = document.getElementById("bottomText");

					function openEnvelope() {
						if (envelope.classList.contains("open")) {
							return;
						}

						envelope.classList.add("open");
						envelope.setAttribute("aria-pressed", "true");
						topText.textContent = "Save the Date!";
						middleText.textContent = "WIR WERDEN HEIRATEN!";
						bottomText.textContent = "VANESSA + NICO\n11. September 2027";
					}

					envelope.addEventListener("click", openEnvelope);
					envelope.addEventListener("keydown", (event) => {
						if (event.key === "Enter" || event.key === " ") {
							event.preventDefault();
							openEnvelope();
						}
					});
				</script>
	</body>
</html>
